<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/benignity-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Benignity provides free vacation lodging for patients with life-limiting illness and unpaid caregivers — creating space for rest, dignity, and meaningful memories." />
    <title>Benignity, Inc. — Giving Families Room to Breathe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hidden form for Netlify form detection (required for React SPAs) -->
    <form name="benignity-application" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="hidden" name="form-name" value="benignity-application" />
      <input name="bot-field" />
      <input name="first-name" />
      <input name="last-name" />
      <input name="date-of-birth" type="date" />
      <input name="phone" type="tel" />
      <input name="email" type="email" />
      <input name="street-address" />
      <input name="street-address-2" />
      <input name="city" />
      <input name="state" />
      <input name="zip" />
      <input name="applicant-type" type="radio" />
      <input name="patient-name" />
      <input name="relationship-to-patient" />
      <input name="diagnosis" />
      <input name="healthcare-provider" />
      <select name="number-of-guests"><option>1</option><option>2</option></select>
      <input name="accessibility-needs" />
      <input name="special-accommodations" />
      <textarea name="why-meaningful"></textarea>
      <input name="physician-statement" type="file" />
      <input name="terms-accepted" type="checkbox" />
      <input name="signature" />
      <input name="signature-date" type="date" />
    </form>
  </body>
</html>
